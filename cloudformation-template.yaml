AWSTemplateFormatVersion: '2010-09-09'
Description: NatureMama Heritage - Order API (Lambda + API Gateway + DynamoDB + SES)

Parameters:
  SenderEmail:
    Type: String
    Description: Verified SES email address used to send order confirmations
    AllowedPattern: ^[^\s@]+@[^\s@]+\.[^\s@]+$
    ConstraintDescription: Must be a valid email address verified in Amazon SES

Resources:

  # ---- DynamoDB Table ----
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: NatureMamaOrders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderNumber
          AttributeType: S
      KeySchema:
        - AttributeName: orderNumber
          KeyType: HASH

  # ---- IAM Role for Lambda ----
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NatureMamaLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: NatureMamaLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:us-east-1:*:*
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource: !GetAtt OrdersTable.Arn
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: '*'

  # ---- Lambda Function ----
  OrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: NatureMamaOrderHandler
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 15
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable
          SENDER_EMAIL: !Ref SenderEmail
      Code:
        ZipFile: |
          const { DynamoDBClient, PutItemCommand } = require("@aws-sdk/client-dynamodb");
          const { SESClient, SendEmailCommand } = require("@aws-sdk/client-ses");

          const dynamo = new DynamoDBClient({ region: "us-east-1" });
          const ses = new SESClient({ region: "us-east-1" });

          function generateOrderNumber() {
            var ts = Date.now().toString(36).toUpperCase();
            var rand = Math.random().toString(36).substring(2, 6).toUpperCase();
            return "NMH-" + ts + "-" + rand;
          }

          function buildEmailHtml(order) {
            var itemsHtml = order.items.map(function(item) {
              return '<tr>' +
                '<td style="padding:12px 16px;border-bottom:1px solid #e8dcc8;">' + item.name + '</td>' +
                '<td style="padding:12px 16px;border-bottom:1px solid #e8dcc8;text-align:center;">' + item.quantity + '</td>' +
                '<td style="padding:12px 16px;border-bottom:1px solid #e8dcc8;text-align:right;">$' + (item.price * item.quantity).toFixed(2) + '</td>' +
                '</tr>';
            }).join("");

            return '<!DOCTYPE html><html><head><meta charset="utf-8"></head>' +
              '<body style="margin:0;padding:0;background:#fefdfb;font-family:Arial,sans-serif;">' +
              '<div style="max-width:600px;margin:0 auto;background:#ffffff;">' +
              '<div style="background:#2d5016;padding:32px;text-align:center;">' +
              '<h1 style="color:#ffffff;margin:0;font-size:28px;">NatureMama<span style="color:#c8a96e;">Heritage</span></h1>' +
              '</div>' +
              '<div style="padding:32px;">' +
              '<h2 style="color:#2d5016;margin-top:0;">Order Confirmed!</h2>' +
              '<p style="color:#555;">Thank you for your order, <strong>' + order.customer.fullName + '</strong>.</p>' +
              '<p style="color:#555;">Your order number: <strong style="color:#2d5016;font-size:18px;">' + order.orderNumber + '</strong></p>' +
              '<table style="width:100%;border-collapse:collapse;margin:24px 0;">' +
              '<thead><tr style="background:#f5f0e8;">' +
              '<th style="padding:12px 16px;text-align:left;color:#2d5016;">Product</th>' +
              '<th style="padding:12px 16px;text-align:center;color:#2d5016;">Qty</th>' +
              '<th style="padding:12px 16px;text-align:right;color:#2d5016;">Subtotal</th>' +
              '</tr></thead><tbody>' + itemsHtml + '</tbody>' +
              '<tfoot><tr style="background:#f5f0e8;">' +
              '<td colspan="2" style="padding:12px 16px;font-weight:bold;color:#2d5016;">Total</td>' +
              '<td style="padding:12px 16px;text-align:right;font-weight:bold;color:#2d5016;font-size:18px;">$' + order.totalPrice.toFixed(2) + '</td>' +
              '</tr></tfoot></table>' +
              '<h3 style="color:#2d5016;">Shipping Address</h3>' +
              '<p style="color:#555;">' + order.customer.fullName + '<br>' +
              order.customer.street + '<br>' +
              order.customer.postalCode + ' ' + order.customer.city + '<br>' +
              'Phone: ' + order.customer.phone + '</p>' +
              '</div>' +
              '<div style="background:#1a3009;padding:24px;text-align:center;">' +
              '<p style="color:rgba(255,255,255,0.7);margin:0;font-size:12px;">&copy; 2026 NatureMama Heritage. All rights reserved.</p>' +
              '</div></div></body></html>';
          }

          exports.handler = async function(event) {
            var headers = {
              "Content-Type": "application/json",
              "Access-Control-Allow-Origin": "*",
              "Access-Control-Allow-Headers": "Content-Type",
              "Access-Control-Allow-Methods": "POST,OPTIONS"
            };

            if (event.httpMethod === "OPTIONS") {
              return { statusCode: 200, headers: headers, body: "" };
            }

            try {
              var body = JSON.parse(event.body);
              var orderNumber = generateOrderNumber();

              var order = {
                orderNumber: orderNumber,
                customer: body.customer,
                items: body.items,
                totalPrice: body.totalPrice,
                createdAt: new Date().toISOString()
              };

              await dynamo.send(new PutItemCommand({
                TableName: process.env.TABLE_NAME,
                Item: {
                  orderNumber: { S: orderNumber },
                  customerName: { S: body.customer.fullName },
                  customerEmail: { S: body.customer.email },
                  customerPhone: { S: body.customer.phone },
                  customerStreet: { S: body.customer.street },
                  customerPostalCode: { S: body.customer.postalCode },
                  customerCity: { S: body.customer.city },
                  items: { S: JSON.stringify(body.items) },
                  totalPrice: { N: String(body.totalPrice) },
                  createdAt: { S: order.createdAt }
                }
              }));

              await ses.send(new SendEmailCommand({
                Source: process.env.SENDER_EMAIL,
                Destination: { ToAddresses: [body.customer.email] },
                Message: {
                  Subject: { Data: "Order Confirmed - " + orderNumber + " | NatureMama Heritage" },
                  Body: { Html: { Data: buildEmailHtml(order) } }
                }
              }));

              return {
                statusCode: 200,
                headers: headers,
                body: JSON.stringify({ orderNumber: orderNumber, message: "Order placed successfully" })
              };
            } catch (err) {
              console.error("Error:", err);
              return {
                statusCode: 500,
                headers: headers,
                body: JSON.stringify({ message: "Internal server error" })
              };
            }
          };

  # ---- API Gateway REST API ----
  OrderApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: NatureMamaOrderAPI
      Description: REST API for NatureMama Heritage orders

  OrdersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrderApi
      ParentId: !GetAtt OrderApi.RootResourceId
      PathPart: orders

  OrdersPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrderApi
      ResourceId: !Ref OrdersResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${OrderFunction.Arn}/invocations

  OrdersOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrderApi
      ResourceId: !Ref OrdersResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${OrderFunction.Arn}/invocations

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - OrdersPostMethod
      - OrdersOptionsMethod
    Properties:
      RestApiId: !Ref OrderApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref OrderApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrderFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:us-east-1:${AWS::AccountId}:${OrderApi}/*

Outputs:
  ApiUrl:
    Description: API Gateway URL - paste this into your .env file as VITE_API_URL
    Value: !Sub https://${OrderApi}.execute-api.us-east-1.amazonaws.com/prod
  OrdersTableName:
    Description: DynamoDB table name for orders
    Value: !Ref OrdersTable
